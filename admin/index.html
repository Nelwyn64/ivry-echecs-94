<!doctype html>
<html lang="fr">
<head>
  <meta charset="utf-8" />
  <title>Ivry Échecs 94 — Admin</title>

  <!-- Charge Decap CMS -->
  <script src="https://unpkg.com/decap-cms@^3.0.0/dist/decap-cms.js"></script>

  <!-- Charge Netlify Identity (authentification) -->
  <script src="https://identity.netlify.com/v1/netlify-identity-widget.js"></script>

  <script>
    // Initialise Decap CMS avec le bon chemin vers config.yml
    CMS.init({ configPath: '/admin/config.yml' });

    // Redirige automatiquement après login via Netlify Identity
    if (window.netlifyIdentity) {
      window.netlifyIdentity.on("init", user => {
        if (!user) {
          window.netlifyIdentity.on("login", () => {
            document.location.href = "/admin/";
          });
        }
      });
    }
  </script>
</head>
<body>
  <h1 style="text-align:center; margin-top:50px;">Chargement du CMS…</h1>
  <p style="text-align:center;">Si rien ne s’affiche, clique pour te connecter :</p>
  <div style="text-align:center;">
    <button onclick="if(window.netlifyIdentity){window.netlifyIdentity.open()}">
      Se connecter
    </button>
  </div>
</body>
</html>
