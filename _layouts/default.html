<!doctype html>
<html lang="fr">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>
    {% if page.title %}{{ page.title }} · {% endif %}{{ site.title | default: "Ivry Échecs 94" }}
  </title>
  <meta name="robots" content="index,follow" />

  <!-- Feuilles de style du site -->
  <link rel="stylesheet" href="/css/typography.css">
  <link rel="stylesheet" href="/css/styles.css">

  <!-- Favicon (optionnel si présent) -->
  <link rel="icon" href="/assets/favicon.svg" type="image/svg+xml">
</head>
<body class="{{ page.class }}">

  <!-- En-tête + Navigation -->
  <header class="site-header">
    <div class="container header-inner">
      <a class="site-logo" href="/" aria-label="Accueil">
        <img src="/assets/logo.png" alt="Ivry Échecs 94" loading="lazy" />
      </a>

      <!-- Bouton burger pour mobile -->
      <button class="nav-toggle" aria-label="Ouvrir le menu" aria-expanded="false">
        <span class="sr-only">Menu</span>
        <span class="bar"></span>
        <span class="bar"></span>
        <span class="bar"></span>
      </button>

      <!-- Menu principal -->
      <nav id="site-nav" class="site-nav" role="navigation" aria-label="Navigation principale">
  <ul>
    <li><a href="/" {% if page.url == '/' %}aria-current="page"{% endif %}>Accueil</a></li>
    <li><a href="/about/" {% if page.url == '/about/' %}aria-current="page"{% endif %}>Le club</a></li>
    <li><a href="/agenda/" {% if page.url == '/agenda/' %}aria-current="page"{% endif %}>Agenda</a></li>
    <li><a href="/tarifs/" {% if page.url == '/tarifs/' %}aria-current="page"{% endif %}>Tarifs</a></li>
    <li><a href="/adhesion/" {% if page.url == '/adhesion/' %}aria-current="page"{% endif %}>Adhésion</a></li>
    <li><a href="/contact/" {% if page.url == '/contact/' %}aria-current="page"{% endif %}>Contact</a></li>
  </ul>
</nav>

    </div>
  </header>

  <!-- Contenu des pages -->
  <main id="content" class="site-content">
    {{ content }}
  </main>

  <!-- Pied de page (simple / personnalisable) -->
  <footer class="site-footer">
    <div class="container">
      <p>&copy; {{ "now" | date: "%Y" }} {{ site.title | default: "Ivry Échecs 94" }} — Tous droits réservés.</p>
    </div>
  </footer>

  <!-- JS du site (si vous avez un fichier) -->
  <script src="/js/main.js" defer></script>

  <!-- Script pour le menu mobile (intégré ici comme demandé) -->
  <script>
    document.addEventListener("DOMContentLoaded", function () {
      const toggle = document.querySelector(".nav-toggle");
      const nav = document.getElementById("site-nav");

      if (toggle && nav) {
        toggle.addEventListener("click", function () {
          const isOpen = nav.classList.toggle("open");
          this.setAttribute("aria-expanded", isOpen ? "true" : "false");
        });
      }
    });
  </script>
</body>
</html>
